<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Dashboard - Kelola Masukan Kotak Saran">
    <title>Admin Dashboard - Kotak Saran</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .admin-header { background: linear-gradient(135deg, #004080, #0066cc); color: #fff; padding: 30px 20px; text-align: center; margin-bottom: 30px; }
        .admin-header h1 { margin: 0; font-size: 2rem; }
        .admin-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .admin-controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .admin-controls button { padding: 10px 20px; background: #004080; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
        .admin-controls button:hover { background: #0066cc; }
        .stats { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-box { background: #f0f2f5; padding: 15px; border-radius: 8px; flex: 1; min-width: 150px; border-left: 4px solid #004080; }
        .stat-box h3 { margin: 0 0 5px 0; color: #004080; font-size: 0.9rem; }
        .stat-box .number { font-size: 2rem; font-weight: bold; color: #004080; }
        .submissions-container { display: grid; gap: 15px; }
        .submission-card { background: #fff; padding: 20px; border-radius: 8px; border-left: 4px solid #004080; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        .submission-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
        .submission-name { font-weight: 600; color: #004080; font-size: 1.1rem; }
        .submission-date { font-size: 0.85rem; color: #666; }
        .submission-meta { display: flex; gap: 20px; font-size: 0.9rem; margin-bottom: 12px; flex-wrap: wrap; }
        .submission-meta label { color: #666; }
        .submission-meta a { color: #0066cc; text-decoration: none; }
        .submission-meta a:hover { text-decoration: underline; }
        .submission-text { background: #f9f9f9; padding: 12px; border-radius: 4px; font-size: 0.95rem; line-height: 1.6; color: #333; }
        .submission-actions { display: flex; gap: 10px; margin-top: 12px; }
        .submission-actions button { padding: 6px 12px; font-size: 0.85rem; background: #f0f2f5; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; transition: background .3s; }
        .submission-actions button:hover { background: #ddd; }
        .empty-state { text-align: center; padding: 40px 20px; color: #666; }
        .empty-state p { font-size: 1.1rem; }
        .password-dialog { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.5); z-index: 1000; justify-content: center; align-items: center; }
        .password-dialog.active { display: flex; }
        .password-box { background: #fff; padding: 30px; border-radius: 8px; text-align: center; }
        .password-box h2 { margin-top: 0; }
        .password-box input { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        .password-box button { padding: 10px 20px; background: #004080; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .delete-btn { background: #dc3545 !important; color: #fff !important; }
        .delete-btn:hover { background: #c82333 !important; }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>🔒 Admin Dashboard - Kotak Saran</h1>
        <p>Kelola semua masukan dan saran yang telah diterima</p>
    </div>

    <div class="admin-container">
        <div class="admin-controls">
            <button onclick="exportData()">📥 Export Masukan (CSV)</button>
            <button onclick="clearAllData()" class="delete-btn">🗑️ Hapus Semua</button>
            <button onclick="logout()">🚪 Keluar</button>
        </div>

        <div class="stats">
            <div class="stat-box">
                <h3>Total Masukan</h3>
                <div class="number" id="totalCount">0</div>
            </div>
            <div class="stat-box">
                <h3>Hari Ini</h3>
                <div class="number" id="todayCount">0</div>
            </div>
        </div>

        <div id="submissionsContainer" class="submissions-container"></div>
        <div id="emptyState" class="empty-state" style="display: none;">
            <p>📭 Belum ada masukan yang diterima.</p>
        </div>
    </div>

    <div id="passwordDialog" class="password-dialog">
        <div class="password-box">
            <h2>🔐 Masuk Admin</h2>
            <p>Masukkan password untuk mengakses dashboard:</p>
            <input type="password" id="passwordInput" placeholder="Password" onkeypress="if(event.key==='Enter') checkPassword()">
            <button onclick="checkPassword()">Masuk</button>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'PII2026'; // Password default
        const STORAGE_KEY = 'suggestions';
        
        // Check if user is authenticated
        function isAuthenticated() {
            return sessionStorage.getItem('adminAuth') === 'true';
        }

        function checkPassword() {
            const password = document.getElementById('passwordInput').value;
            if (password === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminAuth', 'true');
                document.getElementById('passwordDialog').classList.remove('active');
                loadSubmissions();
            } else {
                alert('Password salah!');
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        function logout() {
            sessionStorage.removeItem('adminAuth');
            location.reload();
        }

        function loadSubmissions() {
            const submissions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const container = document.getElementById('submissionsContainer');
            const emptyState = document.getElementById('emptyState');
            
            document.getElementById('totalCount').textContent = submissions.length;
            
            // Count today's submissions
            const today = new Date().toLocaleDateString('id-ID');
            const todayCount = submissions.filter(s => s.timestamp.startsWith(today)).length;
            document.getElementById('todayCount').textContent = todayCount;
            
            if (submissions.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            container.style.display = 'grid';
            emptyState.style.display = 'none';
            
            // Sort by newest first
            submissions.sort((a, b) => b.id - a.id);
            
            container.innerHTML = submissions.map(submission => `
                <div class="submission-card">
                    <div class="submission-header">
                        <div class="submission-name">${escapeHtml(submission.name)}</div>
                        <div class="submission-date">${submission.timestamp}</div>
                    </div>
                    <div class="submission-meta">
                        <div><label>Email:</label> <a href="mailto:${escapeHtml(submission.email)}">${escapeHtml(submission.email)}</a></div>
                        <div><label>WhatsApp:</label> ${escapeHtml(submission.phone)}</div>
                    </div>
                    <div class="submission-text">${escapeHtml(submission.suggestion).replace(/\n/g, '<br>')}</div>
                    <div class="submission-actions">
                        <button onclick="deleteSubmission(${submission.id})">🗑️ Hapus</button>
                        <button onclick="copySubmissionText(${submission.id})">📋 Salin</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteSubmission(id) {
            if (confirm('Yakin ingin menghapus masukan ini?')) {
                let submissions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                submissions = submissions.filter(s => s.id !== id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(submissions));
                loadSubmissions();
            }
        }

        function clearAllData() {
            if (confirm('Yakin ingin menghapus SEMUA masukan? Tindakan ini tidak dapat dibatalkan!')) {
                if (confirm('PERHATIAN! Ini adalah konfirmasi terakhir. Semua data akan hilang permanen.')) {
                    localStorage.removeItem(STORAGE_KEY);
                    loadSubmissions();
                    alert('Semua data telah dihapus.');
                }
            }
        }

        function exportData() {
            const submissions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            if (submissions.length === 0) {
                alert('Tidak ada data untuk diexport.');
                return;
            }

            // Create CSV
            let csv = 'No,Tanggal,Nama,Email,WhatsApp,Saran\n';
            submissions.forEach((s, index) => {
                csv += `${index + 1},"${s.timestamp}","${s.name.replace(/"/g, '""')}","${s.email}","${s.phone}","${s.suggestion.replace(/"/g, '""').replace(/\n/g, ' ')}"\n`;
            });

            // Download
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `masukan_kotak_saran_${new Date().toLocaleDateString('id-ID')}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function copySubmissionText(id) {
            const submissions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const submission = submissions.find(s => s.id === id);
            if (submission) {
                const text = `Nama: ${submission.name}\nEmail: ${submission.email}\nWhatsApp: ${submission.phone}\n\nSaran:\n${submission.suggestion}`;
                navigator.clipboard.writeText(text).then(() => {
                    alert('✓ Teks berhasil disalin ke clipboard!');
                });
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // On page load
        if (isAuthenticated()) {
            document.getElementById('passwordDialog').classList.remove('active');
            loadSubmissions();
            // Refresh data every 5 seconds
            setInterval(loadSubmissions, 5000);
        } else {
            document.getElementById('passwordDialog').classList.add('active');
            document.getElementById('passwordInput').focus();
        }
    </script>
</body>
</html>
